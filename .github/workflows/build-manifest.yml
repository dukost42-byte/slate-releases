name: Build manifest
on:
  push:
    paths: ['plugins/**']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm i adm-zip
      - run: node tools/build-manifest.js plugins "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/plugins" manifest.json
      - name: Commit manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git commit -m "rebuild manifest" || echo "no changes"
          git push
